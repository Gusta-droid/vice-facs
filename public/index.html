<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAC's Vice</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">FAC's • Controle de disponibilidade</div>

<header>
    <div class="logo">FAC's VICE</div>
    <nav id="menu"></nav>

    <div class="admin-area">

  <!-- BOTÃO DISCORD -->
  <a href="https://discord.gg/ZjzTrvgG5q" target="_blank" class="discord-btn">
    <i class="fab fa-discord"></i>
  </a>

  <button class="login-btn" onclick="abrirLogin()">Entrar</button>
  <button class="logout-btn" onclick="logout()" style="display:none;">Sair</button>

</div>
</header>

<div class="hero"></div>

<!--  PAINEL MASTER --->
<div id="masterPanel" style="display:none; padding:15px;">

    <button onclick="abrirAddFac()" class="master-btn">
        ➕ Adicionar FAC
    </button>

</div>

<div class="container" id="conteudo"></div>

<!-- modal LOGIN -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h3>Login Admin</h3>
        <input type="password" id="senhaInput" placeholder="Digite a senha">
        <button onclick="verificarSenha()">Entrar</button>
        <button onclick="fecharLogin()">Cancelar</button>
    </div>
</div>

<!-- MODAL DETALHES -->
<div class="modal" id="detalheModal">
    <div class="modal-content">
        <h3 id="detalheTitulo"></h3>
        <p id="detalheDescricao"></p>
        <button onclick="fecharDetalhe()">Fechar</button>
    </div>
</div>

<!--  sadwdFIREBASE + SISTEMA -->
<script type="module" src="script.js"></script>

<footer class="rodape">
  Desenvolvido por <span>Dev Gusta 🚀</span>
</footer>

<!-- MODAL ADICIONAR FAC -->
<div id="addFacModal" class="modal" style="display:none;">

<div class="modal-box">

<h2>Adicionar FAC</h2>

<input id="novaNome" placeholder="Nome da FAC">

<select id="novaCategoria">
<option>ARMAS</option>
<option>MUNIÇÃO</option>
<option>DROGAS</option>
<option>DESMANCHE</option>
<option>LAVAGEM</option>
</select>

<input id="novaImagem" placeholder="Imagem (ex: img/fac.png)">

<textarea id="novaDescricao"
placeholder="Descrição da FAC"></textarea>

<button onclick="salvarNovaFac()">Salvar</button>
<button onclick="fecharAddFac()">Cancelar</button>

</div>
</div>

</body>
</html>
